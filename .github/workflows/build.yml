name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Xcode project
        run: |
          mkdir App
          cp -r web App/

      - name: Build
        run: |
          clang -framework UIKit -framework WebKit ios/main.swift -o App/WebApp

      - name: Create IPA
        run: |
          mkdir -p Payload/WebApp.app
          cp App/WebApp Payload/WebApp.app/
          cp -r web Payload/WebApp.app/

          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: app.ipa
