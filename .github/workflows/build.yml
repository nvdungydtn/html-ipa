name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create minimal Xcode project
        run: |
          mkdir App
          mkdir -p App/WebApp.app
          cp -r web/* App/WebApp.app/

          cat > App/WebApp.app/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>WebApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.web.app</string>
            <key>CFBundleName</key>
            <string>WebApp</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          EOF

          echo "#!/bin/bash" > App/WebApp.app/WebApp
          echo "exit 0" >> App/WebApp.app/WebApp
          chmod +x App/WebApp.app/WebApp

      - name: Create IPA
        run: |
          mkdir Payload
          mv App/WebApp.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: app.ipa
